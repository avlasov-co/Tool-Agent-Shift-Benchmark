name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -r requirements.txt
      - name: Compile
        run: python -m compileall -q src tests
      - name: Tests
        run: python -m pytest -q
      - name: Small eval
        run: python -m src.run_eval --config configs/small.yaml --seed 42
      - name: Plots
        run: python -m src.plot_results
      - name: Report
        run: python -m src.generate_report
